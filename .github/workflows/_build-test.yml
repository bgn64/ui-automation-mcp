name: Build and Test

on:
  workflow_call:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build UIAutomation.slnx -c Release --nologo

      - name: Test
        run: dotnet test UIAutomation.slnx -c Release --nologo --no-build
